# Configuration Quarkus - Scheduler API
quarkus.application.name=Quarkus Scheduler API
quarkus.application.version=1.0.0

# Database Configuration
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=${DB_USERNAME:postgres}
quarkus.datasource.password=${DB_PASSWORD:postgres}
quarkus.datasource.jdbc.url=${DB_JDBC_URL:jdbc:postgresql://localhost:5432/scheduler_db}
quarkus.hibernate-orm.database.generation=${DB_GENERATION:update}
quarkus.log.category."io.quarkus.config".level=DEBUG


# JPA/Hibernate Configuration
quarkus.hibernate-orm.dialect=org.hibernate.dialect.PostgreSQLDialect
quarkus.hibernate-orm.packages=com.timescheduler.entity

# REST Configuration
quarkus.resteasy-reactive.path=/

# Logging
quarkus.log.level=INFO
quarkus.log.category."com.timescheduler".level=DEBUG

# HTTP Configuration
quarkus.http.port=${PORT:8080}
quarkus.http.test-port=8081

# CORS Configuration
quarkus.http.cors=true
quarkus.http.cors.origins=${CORS_ORIGINS:http://localhost:3000,http://localhost:4200,http://localhost:5173,http://127.0.0.1:5173,https://appfinalfront.netlify.app}
quarkus.http.cors.methods=GET,POST,PUT,DELETE,OPTIONS
quarkus.http.cors.headers=Content-Type,Authorization,Accept
quarkus.http.cors.exposed-headers=Content-Type,Authorization
quarkus.http.cors.access-control-allow-credentials=true

# Jackson Configuration
quarkus.jackson.write-dates-as-timestamps=false

# Authentication (JWT)
app.auth.jwt.secret=${JWT_SECRET:change-this-secret-in-production-please-at-least-32-characters}
app.auth.jwt.issuer=timescheduler-api
app.auth.jwt.expiration-minutes=120

# Google OAuth (Sign in with Google)
# Client ID public OAuth 2.0 (type "Web application") cree dans Google Cloud Console
app.auth.google.client-id=${GOOGLE_CLIENT_ID:93329569030-h4cgm614kfba00qml3qk4okj3ce3ig5d.apps.googleusercontent.com}

# Email (API HTTP Brevo - fonctionne sur Render, contrairement au SMTP qui y est bloque)
app.mail.from=${MAIL_FROM:no-reply@timescheduler.app}
app.brevo.api-key=${BREVO_API_KEY:}

# URLs utilisees dans les liens de verification d'email
app.frontend.url=${FRONTEND_URL:https://appfinalfront.netlify.app}
app.backend.url=${BACKEND_URL:https://appfinalback.onrender.com}
