# Configuration Quarkus - Scheduler API
quarkus.application.name=Quarkus Scheduler API
quarkus.application.version=1.0.0

# Database Configuration
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=postgres
quarkus.datasource.password=postgres
quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5432/scheduler_db
quarkus.hibernate-orm.database.generation=drop-and-create

# JPA/Hibernate Configuration
quarkus.hibernate-orm.dialect=org.hibernate.dialect.PostgreSQLDialect
quarkus.hibernate-orm.packages=com.timescheduler.entity

# REST Configuration
quarkus.resteasy-reactive.path=/

# Logging
quarkus.log.level=INFO
quarkus.log.category."com.timescheduler".level=DEBUG

# HTTP Configuration
quarkus.http.port=8080
quarkus.http.test-port=8081

# CORS Configuration
quarkus.http.cors=true
quarkus.http.cors.origins=http://localhost:3000,http://localhost:4200,http://localhost:5173,http://127.0.0.1:5173

# Jackson Configuration
quarkus.jackson.write-dates-as-timestamps=false

# Authentication (JWT)
app.auth.jwt.secret=change-this-secret-in-production-please-at-least-32-characters
app.auth.jwt.issuer=timescheduler-api
app.auth.jwt.expiration-minutes=120
